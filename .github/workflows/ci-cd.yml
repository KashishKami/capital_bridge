name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  CI-test:
    name: CI - Lint, Format, Typecheck, and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format

      - name: Typecheck
        run: npm run typecheck

      - name: Run Tests
        run: npm test -- --run

  CD-deploy:
    name: CD-Deploying to Vercel
    runs-on: ubuntu-latest
    needs: CI-test # Runs only after the CI-test job has passed.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # This ensures that the CD-deploy job only runs when a push to the main branch is made. Not on any other branch.
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Vercel CLI
        run: npm install --global vercel
      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production
      - name: Build
        run: vercel build --prod
      - name: Deploy
        run: vercel deploy --prebuilt --prod
